<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Network Monitoring Agent</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DevOps Network Monitoring Agent</h1>
            <nav>
                <button class="nav-btn active" data-tab="incidents">Incidents</button>
                <button class="nav-btn" data-tab="allowlist">Allowlist</button>
            </nav>
        </header>

        <main>
            <section id="incidents-section" class="tab-content active">
                <div class="section-header">
                    <h2>Incidents</h2>
                    <div class="export-actions" aria-label="Export block list">
                        <a class="export-link" href="/api/blocks/export/csv" download>CSV</a>
                        <a class="export-link" href="/api/blocks/export/markdown" download>Markdown</a>
                        <a class="export-link" href="/api/blocks/export/xlsx" download>XLSX</a>
                    </div>
                </div>
                <div class="incident-filter-bar">
                    <label class="filter-field">
                        <span>Status</span>
                        <select id="incident-status-filter">
                            <option value="all">All statuses</option>
                            <option value="detected">Detected</option>
                            <option value="approved">Block Approved</option>
                            <option value="rejected">Dismissed</option>
                        </select>
                    </label>
                    <label class="filter-field">
                        <span>Block</span>
                        <select id="incident-block-filter">
                            <option value="all">All block states</option>
                            <option value="active">Active in cluster</option>
                            <option value="applied">Applied</option>
                            <option value="needs_apply">Needs apply</option>
                            <option value="dry_run">Dry run</option>
                            <option value="failed">Failed or missing</option>
                            <option value="pending">Pending</option>
                            <option value="none">No action</option>
                        </select>
                    </label>
                    <label class="filter-field">
                        <span>Report</span>
                        <select id="incident-report-filter">
                            <option value="all">All report states</option>
                            <option value="sent">Sent</option>
                            <option value="not_sent">Not sent</option>
                            <option value="failed">Failed</option>
                            <option value="pending">Pending</option>
                        </select>
                    </label>
                    <label class="filter-field filter-search">
                        <span>Search</span>
                        <input id="incident-search" type="search" placeholder="IP, host, path, status">
                    </label>
                    <button id="clear-incident-filters" class="btn-secondary" type="button">Clear</button>
                    <div id="incident-filter-count" class="filter-count"></div>
                </div>
                <div id="incidents-list" class="list-container">
                    <p class="loading">Loading incidents...</p>
                </div>
            </section>

            <section id="allowlist-section" class="tab-content">
                <h2>Allowlist Management</h2>
                <div class="add-ip-form">
                    <input type="text" id="new-ip" placeholder="Enter IP address">
                    <input type="text" id="ip-description" placeholder="Description (optional)">
                    <button id="add-ip-btn">Add to Allowlist</button>
                </div>
                <div id="allowlist-list" class="list-container">
                    <p class="loading">Loading allowlist...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
